<div class="ocean">
  <div class="sun"></div>
  <div class="wave wave1"></div>
  <div class="wave wave2"></div>
</div>

<main class="app">
  <header>
    <div>
      <h1>2048 🌊</h1>
      <p class="sub">Coastal edition — merge tiles to reach 2048.</p>
    </div>
    <div class="scores">
      <div class="pill"><small>Score</small><span id="score">0</span></div>
      <div class="pill"><small>Best</small><span id="best">0</span></div>
    </div>
  </header>
  <div class="controls">
    <button class="btn" id="newGame">New game</button>
    <div class="hint">Use arrow keys (or swipe).</div>
  </div>
  <section class="boardWrap">
    <div class="board" id="board" aria-label="2048 board">
      <div class="grid" id="grid"></div>
      <div class="tiles" id="tiles"></div>
      <div class="overlay" id="overlay">
        <h2 id="overlayTitle">Game over</h2>
        <p id="overlayText">Try again?</p>
        <button class="btn" id="retry">Play again</button>
      </div>
    </div>
  </section>
  <footer>Tip: tiles only merge once per move 🐚</footer>
</main>
