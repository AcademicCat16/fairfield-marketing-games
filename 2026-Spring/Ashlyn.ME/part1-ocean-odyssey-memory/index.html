<header class="app-header" role="banner">
  <h1>🌊 Ocean Odyssey — Memory</h1>
  <div class="hud" role="status" aria-live="polite">
    <div class="hud__item">⏱️ Time: <span id="time">0.0</span>s</div>
    <div class="hud__item">⭐ Score: <span id="score">0</span></div>
    <div class="hud__item">🔥 Combo: <span id="combo">0×</span></div>
    <button id="resetBtn" class="btn btn--primary" type="button" aria-label="Reset game">Reset</button>
  </div>
</header>
<main class="game" role="main">
  <p class="help">Flip two cards to find a match. Matches boost your combo; misses cost points.</p>
  <section id="grid" class="grid" aria-label="Memory grid"></section>
</main>
<div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="winTitle" hidden>
  <div class="modal__content">
    <h2 id="winTitle">You found every pair! 🎉</h2>
    <p><strong>Time:</strong> <span id="finalTime"></span>s</p>
    <p><strong>Score:</strong> <span id="finalScore"></span></p>
    <p><strong>Grade:</strong> <span id="finalGrade"></span></p>
    <div class="modal__actions">
      <button id="playAgainBtn" class="btn btn--primary">Play again</button>
    </div>
  </div>
</div>
