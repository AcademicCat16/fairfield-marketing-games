<div id="wrapper">
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <div id="menu">
    <button class="menu-button" id="startBtn">Start a New Game</button>
    <button class="menu-button" id="loadBtn">Load a Game</button>
  </div>

  <!-- Map Screen -->
  <div id="mapScreen">
    <canvas id="mapCanvas" width="800" height="600"></canvas>
    <button class="menu-button" id="returnMainBtn">Return to Main Menu</button>
    <div id="gameUI">
      <span id="score">Score: 0</span> | <span id="timer">Time: 60</span>
    </div>
  </div>
</div>
