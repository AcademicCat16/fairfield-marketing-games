<h1 style="text-align:center;font-family:sans-serif;">
Carys 4096
</h1>
<div id="game"></div>
<style>
body {
background:#faf8ef;
font-family:Arial;
}
#game {
width:400px;
height:400px;
margin:20px auto;
background:#bbada0;
display:grid;
grid-template-columns:repeat(4,1fr);
grid-gap:10px;
padding:10px;
border-radius:10px;
}
.tile {
background:#cdc1b4;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:bold;
border-radius:6px;
}
.t2{background:#eee4da;}
.t4{background:#ede0c8;}
.t8{background:#f2b179;color:white;}
.t16{background:#f59563;color:white;}
.t32{background:#f67c5f;color:white;}
.t64{background:#f65e3b;color:white;}
.t128{background:#edcf72;color:white;}
.t256{background:#edcc61;color:white;}
.t512{background:#edc850;color:white;}
.t1024{background:#edc53f;color:white;}
.t2048{background:#edc22e;color:white;}
.t4096{background:#3c3a32;color:white;}
</style>
<script>
const size = 4;
let board = [];
const game = document.getElementById("game");
function startGame(){
board = Array(size).fill().map(()=>Array(size).fill(0));
addTile();
addTile();
draw();
}
function addTile(){
let empty=[];
for(let r=0;r<size;r++)
for(let c=0;c<size;c++)
if(board[r][c]==0) empty.push([r,c]);
if(empty.length===0) return;
let [r,c]=empty[Math.floor(Math.random()*empty.length)];
board[r][c]=Math.random()<0.9?2:4;
}
function draw(){
game.innerHTML="";
board.flat().forEach(v=>{
let d=document.createElement("div");
d.className="tile "+(v?("t"+v):"");
d.textContent=v||"";
game.appendChild(d);
});
}
function slide(row){
row=row.filter(v=>v);
for(let i=0;i<row.length-1;i++){
if(row[i]===row[i+1]){
row[i]*=2;
row[i+1]=0;
}
}
row=row.filter(v=>v);
while(row.length<size) row.push(0);
return row;
}
function rotate(){
let newB=[];
for(let c=0;c<size;c++){
newB[c]=[];
for(let r=size-1;r>=0;r--)
newB[c].push(board[r][c]);
}
board=newB;
}
function move(dir){
for(let i=0;i<dir;i++) rotate();
for(let r=0;r<size;r++)
board[r]=slide(board[r]);
for(let i=0;i<(4-dir)%4;i++) rotate();
addTile();
draw();
}
document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") move(0);
if(e.key==="ArrowUp") move(1);
if(e.key==="ArrowRight") move(2);
if(e.key==="ArrowDown") move(3);
});
startGame();
</script>
