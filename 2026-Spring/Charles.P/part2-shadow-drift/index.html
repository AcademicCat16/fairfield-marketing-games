<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}
h1 {
  margin-top: 10px;
}
#game {
  background: #1b1b1b;
  display: block;
  margin: 20px auto;
  border: 2px solid white;
}
#ui {
  width: 600px;
  margin: 0 auto;
}
#bar {
  width: 100%;
  height: 15px;
  background: #333;
  margin-top: 5px;
}
#fill {
  height: 100%;
  width: 50%;
  background: cyan;
}
#message {
  font-size: 24px;
  margin-top: 15px;
}
</style>

<h1>Shadow Drift</h1>
<div id="ui">
  Stability: <span id="score">50</span>
  <div id="bar">
    <div id="fill"></div>
  </div>
</div>
<canvas id="game" width="600" height="400"></canvas>
<div id="message"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 300, y: 200, size: 15, speed: 3 };
let stability = 50;
let keys = {};
let orbs = [];
let fragments = [];
let gameOver = false;
let startTime = Date.now();

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function spawnOrb() {
  orbs.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: 8 });
}
function spawnFragment() {
  fragments.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: 10 });
}

function update() {
  if (gameOver) return;
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;
  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  orbs.forEach((orb, index) => {
    let dx = player.x - orb.x;
    let dy = player.y - orb.y;
    if (Math.sqrt(dx*dx + dy*dy) < player.size + orb.size) {
      stability += 5;
      orbs.splice(index, 1);
    }
  });

  fragments.forEach((frag, index) => {
    let dx = player.x - frag.x;
    let dy = player.y - frag.y;
    if (Math.sqrt(dx*dx + dy*dy) < player.size + frag.size) {
      stability -= 10;
      fragments.splice(index, 1);
    }
  });

  stability -= 0.05;
  stability = Math.max(0, Math.min(100, stability));
  document.getElementById("score").innerText = Math.floor(stability);
  document.getElementById("fill").style.width = stability + "%";

  let elapsed = (Date.now() - startTime) / 1000;
  if (elapsed > 45) {
    gameOver = true;
    document.getElementById("message").innerText = "You Survived!";
  }
  if (stability <= 0) {
    gameOver = true;
    document.getElementById("message").innerText = "You Collapsed!";
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();

  orbs.forEach(orb => {
    ctx.beginPath();
    ctx.arc(orb.x, orb.y, orb.size, 0, Math.PI * 2);
    ctx.fillStyle = "cyan";
    ctx.fill();
  });

  fragments.forEach(frag => {
    ctx.beginPath();
    ctx.arc(frag.x, frag.y, frag.size, 0, Math.PI * 2);
    ctx.fillStyle = "red";
    ctx.fill();
  });
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

setInterval(spawnOrb, 1500);
setInterval(spawnFragment, 2000);
gameLoop();
</script>
