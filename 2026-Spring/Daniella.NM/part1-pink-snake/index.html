<div class="wrapper">
  <div class="header">
    <h1>💖 Pink Snake 💖</h1>
    <div class="hud">
      <div class="pill">Score: <span id="score">0</span></div>
      <div class="pill">Best: <span id="best">0</span></div>
    </div>
  </div>
  <div class="board-wrap">
    <canvas id="game" width="500" height="500"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-icon">🐍</div>
      <h2 id="overlayTitle">💖 Pink Snake 💖</h2>
      <p id="overlayMsg">Use arrow keys to slither!</p>
      <button id="startBtn">Press Enter or Click to Start 🎀</button>
    </div>
  </div>
  <div class="note">Arrow Keys or WASD to move</div>
</div>
