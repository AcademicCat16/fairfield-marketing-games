<div class="wrap">
  <header>
    <h1>Frenchie Bacon Maze</h1>
    <div class="hud">
      <div><b>Level:</b> <span id="level">1</span>/5</div>
      <div><b>Moves:</b> <span id="moves">0</span></div>
    </div>
    <p class="help">Move with <b>WASD</b> or <b>Arrow Keys</b>. Reach 🥓 to advance.</p>
  </header>

  <main>
    <div id="board" class="board"></div>

    <div class="panel">
      <button id="restart">Restart Level</button>
      <button id="reset">Reset Game</button>
    </div>

    <div id="toast" class="toast"></div>
  </main>
</div>
