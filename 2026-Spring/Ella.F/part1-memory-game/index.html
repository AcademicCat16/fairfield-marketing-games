<div class="container">
  <div class="header">
    <h1>🎮 Memory Game</h1>
    <p>Match all the pairs to win!</p>
  </div>

  <div class="stats">
    <div class="stat-box">
      <span class="stat-label">Moves</span>
      <span class="stat-value" id="moves">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Matches</span>
      <span class="stat-value"><span id="matches">0</span>/8</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Score</span>
      <span class="stat-value" id="score">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Time</span>
      <span class="stat-value timer" id="timer">0:00</span>
    </div>
  </div>

  <div class="difficulty-selector">
    <button class="diff-btn active" onclick="setDifficulty('easy', event)">Easy (4×4)</button>
    <button class="diff-btn" onclick="setDifficulty('medium', event)">Medium (4×4)</button>
    <button class="diff-btn" onclick="setDifficulty('hard', event)">Hard (6×6)</button>
  </div>

  <button class="reset-btn" onclick="resetGame()">🔄 Reset Game</button>

  <div class="game-board" id="gameBoard"></div>
  <div class="message" id="message"></div>
</div>

<script src="script.js"></script>
