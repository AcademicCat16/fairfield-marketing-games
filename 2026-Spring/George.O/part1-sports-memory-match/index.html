<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 20px;
  color: white;
}
h1 {
  font-size: 2rem;
  margin-bottom: 4px;
  text-align: center;
  letter-spacing: 1px;
}
.subtitle {
  color: #a0c4ff;
  font-size: 0.9rem;
  margin-bottom: 16px;
  text-align: center;
}
.stats {
  display: flex;
  gap: 24px;
  margin-bottom: 20px;
  background: rgba(255,255,255,0.08);
  padding: 10px 28px;
  border-radius: 50px;
  font-size: 1rem;
}
.stat { display: flex; flex-direction: column; align-items: center; }
.stat-label { font-size: 0.7rem; color: #a0c4ff; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 1.4rem; font-weight: 700; color: #ffd166; }
.grid {
  display: grid;
  grid-template-columns: repeat(4, 110px);
  gap: 14px;
}
.card {
  width: 110px;
  height: 110px;
  cursor: pointer;
  perspective: 600px;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s ease;
  border-radius: 14px;
}
.card.flipped .card-inner,
.card.matched .card-inner {
  transform: rotateY(180deg);
}
.card-front, .card-back {
  position: absolute;
  width: 100%; height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-front {
  background: linear-gradient(135deg, #0f3460, #533483);
  border: 2px solid rgba(160,196,255,0.3);
  color: #a0c4ff;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 2px;
}
.card-back {
  background: linear-gradient(135deg, #16213e, #1a1a2e);
  transform: rotateY(180deg);
  border: 2px solid rgba(255,209,102,0.3);
  font-size: 2.8rem;
}
.card.matched .card-back {
  background: linear-gradient(135deg, #065535, #0a7a4a);
  border: 2px solid #06d6a0;
  box-shadow: 0 0 16px rgba(6,214,160,0.4);
}
.btn {
  margin-top: 22px;
  padding: 10px 32px;
  background: #ffd166;
  color: #1a1a2e;
  border: none;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: transform 0.1s, background 0.2s;
}
.btn:hover { background: #ffca45; transform: scale(1.04); }
.win-banner {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
  z-index: 100;
  flex-direction: column;
  gap: 16px;
}
.win-banner.show { display: flex; }
.win-card {
  background: #16213e;
  border: 2px solid #ffd166;
  border-radius: 20px;
  padding: 40px 60px;
  text-align: center;
}
.win-card h2 { font-size: 2.2rem; color: #ffd166; margin-bottom: 8px; }
.win-card p  { color: #a0c4ff; font-size: 1.1rem; }
.tag {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.3);
  margin-top: 18px;
  text-align: center;
}
</style>

<h1>🏆 Sports Memory Match</h1>
<p class="subtitle">George's A5 — Part 1: Bottom-Up Development | Fairfield Marketing Games</p>
<div class="stats">
  <div class="stat"><span class="stat-label">Moves</span><span class="stat-value" id="moves">0</span></div>
  <div class="stat"><span class="stat-label">Matches</span><span class="stat-value" id="matchCount">0/8</span></div>
  <div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="timer">0s</span></div>
</div>
<div class="grid" id="grid"></div>
<button class="btn" id="newGameBtn">New Game</button>
<p class="tag">Original code adapted from open-source memory card pattern | Modified theme, scoring &amp; visual design</p>

<div class="win-banner" id="winBanner">
  <div class="win-card">
    <h2>🎉 Champion!</h2>
    <p id="winMsg"></p>
    <button class="btn" id="playAgainBtn" style="margin-top:20px">Play Again</button>
  </div>
</div>

<script src="script.js"></script>
