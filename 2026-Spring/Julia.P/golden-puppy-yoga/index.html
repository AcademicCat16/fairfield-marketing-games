<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Puppy Yoga Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="header">
            <h1>Golden Puppy Yoga</h1>
            <p>Hold a pose to welcome the puppies to your mat.</p>
        </div>

        <div id="stats-bar">
            <span>Zen Level: <b id="zen-score">0</b></span>
            <span>Happy Puppies: <b id="puppy-count">0</b></span>
        </div>

        <div id="yoga-studio">
            <div id="yoga-mat">
                <div id="player">🧘</div>
            </div>
            <div id="puppy-layer"></div>
        </div>

        <button id="pose-btn">Begin Yoga Flow</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
