<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💖 Pink Match-3</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --pink0: #fff0f7;
      --pink1: #ffd6ee;
      --pink2: #ffaad9;
      --pink3: #ff70be;
      --pink4: #ff2fa0;
      --pink5: #cc1077;
      --cell: 52px;
      --gap: 3px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffd1e8 0%, #ff7bc8 50%, #ffa0d0 100%);
      font-family: 'Nunito', sans-serif;
      padding: 16px;
      overflow: hidden;
    }

    /* Fireworks */
    #fw {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
    }

    .wrap {
      background: white;
      border-radius: 24px;
      padding: 28px 24px 24px;
      box-shadow: 0 24px 64px rgba(180,20,100,0.28);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      max-width: 560px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--pink4);
      letter-spacing: -0.5px;
      text-shadow: 0 2px 12px rgba(255,47,160,0.18);
    }

    .stats {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }
    .stat {
      flex: 1;
      max-width: 140px;
      background: linear-gradient(135deg, var(--pink4), var(--pink2));
      border-radius: 14px;
      padding: 12px 10px;
      text-align: center;
      color: white;
      box-shadow: 0 4px 16px rgba(255,47,160,0.22);
    }
    .stat-label { font-size: 12px; opacity: .9; margin-bottom: 4px; }
    .stat-value { font-size: 26px; font-weight: 900; line-height: 1; }

    /* Board */
    #board {
      display: grid;
      grid-template-columns: repeat(8, var(--cell));
      grid-template-rows: repeat(8, var(--cell));
      gap: var(--gap);
      background: linear-gradient(135deg, var(--pink4), var(--pink2));
      padding: 6px;
      border-radius: 14px;
      box-shadow: 0 12px 36px rgba(180,20,100,0.25);
      position: relative;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      overflow: visible;
      /* Each cell is just a slot; the candy inside animates */
    }

    .candy {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff5db8 0%, #ffaadd 100%);
      border: 2px solid rgba(255,255,255,0.55);
      box-shadow: 0 4px 10px rgba(255,47,160,0.22);
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.15s;
      user-select: none;
    }

    .candy::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background: radial-gradient(circle at 30% 22%, rgba(255,255,255,.5), transparent 55%);
      pointer-events: none;
    }

    /* Each type gets a subtle tint so players can distinguish */
    .t0 { background: linear-gradient(135deg, #ff5db8, #ffaadd); }
    .t1 { background: linear-gradient(135deg, #ff82cc, #ffd0ee); }
    .t2 { background: linear-gradient(135deg, #f040a0, #ff90cc); }
    .t3 { background: linear-gradient(135deg, #ff3db0, #ff88d0); }
    .t4 { background: linear-gradient(135deg, #e8209a, #ff70c0); }
    .t5 { background: linear-gradient(135deg, #ff6ec4, #ffbce8); }

    .cell:hover .candy { transform: scale(1.08); box-shadow: 0 8px 18px rgba(0,0,0,.18); }

    .candy.selected {
      transform: scale(1.18) !important;
      box-shadow: 0 0 0 3px white, 0 0 18px rgba(255,255,255,.9), 0 8px 18px rgba(0,0,0,.18) !important;
    }

    /* Swap animation classes added by JS */
    .swap-right  { animation: swapR .22s cubic-bezier(.34,1.56,.64,1) forwards; }
    .swap-left   { animation: swapL .22s cubic-bezier(.34,1.56,.64,1) forwards; }
    .swap-down   { animation: swapD .22s cubic-bezier(.34,1.56,.64,1) forwards; }
    .swap-up     { animation: swapU .22s cubic-bezier(.34,1.56,.64,1) forwards; }

    @keyframes swapR { 0%{transform:translateX(0)} 50%{transform:translateX(calc(var(--cell) + var(--gap)))} 100%{transform:translateX(0)} }
    @keyframes swapL { 0%{transform:translateX(0)} 50%{transform:translateX(calc(-1*(var(--cell) + var(--gap))))} 100%{transform:translateX(0)} }
    @keyframes swapD { 0%{transform:translateY(0)} 50%{transform:translateY(calc(var(--cell) + var(--gap)))} 100%{transform:translateY(0)} }
    @keyframes swapU { 0%{transform:translateY(0)} 50%{transform:translateY(calc(-1*(var(--cell) + var(--gap))))} 100%{transform:translateY(0)} }

    /* Match pop */
    @keyframes popOut {
      0%   { transform:scale(1);   opacity:1; }
      40%  { transform:scale(1.25) rotate(8deg); filter:brightness(1.3); }
      100% { transform:scale(0);   opacity:0; }
    }
    .matched { animation: popOut .38s ease-out forwards; }

    /* Drop in from above */
    @keyframes dropIn {
      0%   { transform:translateY(-60px); opacity:0; }
      100% { transform:translateY(0);     opacity:1; }
    }
    .drop-in { animation: dropIn .3s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* Hint pulse */
    @keyframes hintPulse {
      0%,100% { transform:scale(1); box-shadow:0 4px 10px rgba(255,47,160,.22); }
      50%      { transform:scale(1.22); box-shadow:0 0 0 4px white, 0 0 20px #fff; }
    }
    .hint-pulse { animation: hintPulse .5s ease-in-out 3; }

    /* Buttons */
    .btns { display:flex; gap:12px; }
    .btn {
      padding: 11px 28px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 900;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--pink4), var(--pink2));
      color: white;
      box-shadow: 0 4px 14px rgba(255,47,160,.25);
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 7px 20px rgba(255,47,160,.35); }
    .btn:active { transform:translateY(0); }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 20;
      align-items: center;
      justify-content: center;
      animation: fadeIn .28s;
    }
    .modal.open { display:flex; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .modal-box {
      background: white;
      border-radius: 22px;
      padding: 40px 36px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,.28);
      animation: slideUp .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

    .modal-box h2 { color:var(--pink4); font-size:2rem; margin-bottom:16px; }
    .modal-box p  { font-size:1.1rem; color:#444; margin-bottom:8px; }
    .modal-box p span { color:var(--pink4); font-size:1.5rem; font-weight:900; }
    .modal-btns { display:flex; gap:12px; margin-top:26px; justify-content:center; }
    .modal-btns .btn { flex:1; }

    /* Responsive */
    @media (max-width:520px) {
      :root { --cell:40px; }
      h1 { font-size:1.6rem; }
      .wrap { padding:16px 12px; gap:12px; }
      #board { grid-template-columns:repeat(8,var(--cell)); grid-template-rows:repeat(8,var(--cell)); }
      .stat-value { font-size:20px; }
    }
  </style>
</head>
<body>
<canvas id="fw"></canvas>

<div class="wrap">
  <h1>💖 Pink Match-3 💖</h1>

  <div class="stats">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Moves</div><div class="stat-value" id="moves">20</div></div>
    <div class="stat"><div class="stat-label">Goal</div><div class="stat-value" id="goal">5000</div></div>
  </div>

  <div id="board"></div>

  <div class="btns">
    <button class="btn" id="resetBtn">New Game</button>
    <button class="btn" id="hintBtn">Hint (3)</button>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="mTitle">Game Over!</h2>
    <p>Score: <span id="mScore">0</span></p>
    <p id="mGoalLine">Goal: <span id="mGoal">5000</span></p>
    <div class="modal-btns">
      <button class="btn" id="playAgainBtn">Play Again</button>
      <button class="btn" onclick="document.getElementById('modal').classList.remove('open')">Close</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const ROWS = 8, COLS = 8, TYPES = 6;
const INITIAL_MOVES = 20, GOAL = 5000;

// ─── STATE ───────────────────────────────────────────────────────────────────
let grid = [];          // flat array [row*COLS+col] = type (0..TYPES-1)
let selected = null;    // {r, c} or null
let score = 0, movesLeft = INITIAL_MOVES;
let busy = false, hints = 3;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const idx = (r, c) => r * COLS + c;
const rand = () => Math.floor(Math.random() * TYPES);
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─── GRID LOGIC ──────────────────────────────────────────────────────────────
function initGrid() {
  grid = Array.from({length: ROWS * COLS}, rand);
  // Ensure no initial matches
  let pass = true;
  while (pass) {
    pass = false;
    for (const i of getMatches()) { grid[i] = rand(); pass = true; }
  }
}

function getMatches() {
  const m = new Set();
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS - 2; c++)
      if (grid[idx(r,c)] === grid[idx(r,c+1)] && grid[idx(r,c)] === grid[idx(r,c+2)])
        [0,1,2].forEach(d => m.add(idx(r,c+d)));
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r < ROWS - 2; r++)
      if (grid[idx(r,c)] === grid[idx(r+1,c)] && grid[idx(r,c)] === grid[idx(r+2,c)])
        [0,1,2].forEach(d => m.add(idx(r+d,c)));
  return m;
}

function swapGrid(r1,c1,r2,c2) {
  const t = grid[idx(r1,c1)];
  grid[idx(r1,c1)] = grid[idx(r2,c2)];
  grid[idx(r2,c2)] = t;
}

// Drop candies down and fill from top
function gravityAndFill() {
  // For each column, compact downward
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[idx(r,c)] !== null) {
        grid[idx(writeRow,c)] = grid[idx(r,c)];
        if (writeRow !== r) grid[idx(r,c)] = null;
        writeRow--;
      }
    }
    // fill empties at top
    for (let r = writeRow; r >= 0; r--) {
      grid[idx(r,c)] = rand();
    }
  }
}

// ─── DOM / RENDERING ─────────────────────────────────────────────────────────
const board = document.getElementById('board');

function buildBoard() {
  board.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;

      const candy = document.createElement('div');
      candy.className = `candy t${grid[idx(r,c)]}`;

      cell.appendChild(candy);
      cell.addEventListener('click', () => onCellClick(r, c));
      board.appendChild(cell);
    }
  }
  updateSelected();
}

function getCell(r, c) {
  return board.children[r * COLS + c];
}
function getCandy(r, c) {
  return getCell(r, c)?.firstChild;
}

function updateSelected() {
  document.querySelectorAll('.candy').forEach(el => el.classList.remove('selected'));
  if (selected) getCandy(selected.r, selected.c)?.classList.add('selected');
}

function syncCandyType(r, c) {
  const el = getCandy(r, c);
  if (!el) return;
  el.className = `candy t${grid[idx(r,c)]}`;
}

// ─── INTERACTION ─────────────────────────────────────────────────────────────
async function onCellClick(r, c) {
  if (busy || movesLeft <= 0) return;

  if (!selected) {
    selected = {r, c};
    updateSelected();
    return;
  }

  const dr = Math.abs(r - selected.r), dc = Math.abs(c - selected.c);

  // Deselect same cell
  if (dr === 0 && dc === 0) {
    selected = null;
    updateSelected();
    return;
  }

  // Not adjacent — re-select
  if (dr + dc !== 1) {
    selected = {r, c};
    updateSelected();
    return;
  }

  // Adjacent — attempt swap
  const from = selected;
  selected = null;
  updateSelected();

  busy = true;
  await animateSwap(from.r, from.c, r, c);
  swapGrid(from.r, from.c, r, c);

  const matches = getMatches();
  if (matches.size === 0) {
    // Swap back
    await sleep(60);
    await animateSwap(from.r, from.c, r, c);
    swapGrid(from.r, from.c, r, c);
  } else {
    movesLeft--;
    updateHUD();
    await processMatches();
  }

  if (movesLeft <= 0) showModal();
  busy = false;
}

// ─── ANIMATIONS ──────────────────────────────────────────────────────────────
function animateSwap(r1,c1,r2,c2) {
  const el1 = getCandy(r1,c1), el2 = getCandy(r2,c2);
  if (!el1 || !el2) return Promise.resolve();

  const dc = c2-c1, dr = r2-r1;
  el1.classList.add(dc===1?'swap-right': dc===-1?'swap-left': dr===1?'swap-down':'swap-up');
  el2.classList.add(dc===1?'swap-left' : dc===-1?'swap-right':dr===1?'swap-up':'swap-down');

  return new Promise(res => setTimeout(() => {
    el1.classList.remove('swap-right','swap-left','swap-down','swap-up');
    el2.classList.remove('swap-right','swap-left','swap-down','swap-up');
    // Swap visual types
    const t1 = el1.className, t2 = el2.className;
    el1.className = t2; el2.className = t1;
    res();
  }, 230));
}

async function processMatches() {
  let matches = getMatches();
  while (matches.size > 0) {
    triggerFireworks();

    // Animate pop
    matches.forEach(i => {
      const r = Math.floor(i/COLS), c = i%COLS;
      getCandy(r,c)?.classList.add('matched');
    });
    score += matches.size * 100;
    updateHUD();
    await sleep(400);

    // Null out matched in grid
    matches.forEach(i => { grid[i] = null; });

    // Apply gravity & fill
    gravityAndFill();

    // Re-render the board with drop animations
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = getCandy(r,c);
        if (!el) continue;
        const newType = `candy t${grid[idx(r,c)]}`;
        if (el.className !== newType) {
          el.className = newType + ' drop-in';
          setTimeout(() => el.classList.remove('drop-in'), 320);
        }
      }
    }
    await sleep(340);

    matches = getMatches();
  }
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('moves').textContent = movesLeft;
  document.getElementById('goal').textContent  = GOAL;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function showModal() {
  const won = score >= GOAL;
  document.getElementById('mTitle').textContent  = won ? '🎉 You Won! 🎉' : 'Game Over!';
  document.getElementById('mScore').textContent  = score;
  document.getElementById('mGoal').textContent   = GOAL;
  document.getElementById('mGoalLine').style.display = won ? 'none' : 'block';
  document.getElementById('modal').classList.add('open');
  if (won) triggerFireworks();
}

// ─── HINT ────────────────────────────────────────────────────────────────────
function showHint() {
  if (hints <= 0 || busy) return;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const neighbors = [{r:r,c:c+1},{r:r,c:c-1},{r:r+1,c:c},{r:r-1,c:c}];
      for (const nb of neighbors) {
        if (nb.r<0||nb.r>=ROWS||nb.c<0||nb.c>=COLS) continue;
        swapGrid(r,c,nb.r,nb.c);
        const m = getMatches().size;
        swapGrid(r,c,nb.r,nb.c);
        if (m > 0) {
          getCandy(r,c)?.classList.add('hint-pulse');
          getCandy(nb.r,nb.c)?.classList.add('hint-pulse');
          setTimeout(() => {
            getCandy(r,c)?.classList.remove('hint-pulse');
            getCandy(nb.r,nb.c)?.classList.remove('hint-pulse');
          }, 1600);
          hints--;
          document.getElementById('hintBtn').textContent = `Hint (${hints})`;
          return;
        }
      }
    }
  }
}

// ─── FIREWORKS ───────────────────────────────────────────────────────────────
const fwCanvas = document.getElementById('fw');
const fwCtx = fwCanvas.getContext('2d');
let particles = [], fwRunning = false;

function resizeFW() {
  const dpr = devicePixelRatio||1;
  fwCanvas.width  = innerWidth  * dpr;
  fwCanvas.height = innerHeight * dpr;
  fwCanvas.style.width  = innerWidth  + 'px';
  fwCanvas.style.height = innerHeight + 'px';
  fwCtx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize', resizeFW);
resizeFW();

function triggerFireworks() {
  for (let b = 0; b < 5; b++) {
    const x = 80 + Math.random() * (innerWidth  - 160);
    const y = 60 + Math.random() * (innerHeight * 0.45);
    for (let i = 0; i < 80; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 1.5 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
        life: 55 + Math.random()*35, age:0,
        size: 1.8 + Math.random()*2.2,
        hue: 310 + Math.random()*60
      });
    }
  }
  if (!fwRunning) { fwRunning = true; requestAnimationFrame(fwTick); }
}

function fwTick() {
  fwCtx.clearRect(0,0,innerWidth,innerHeight);
  particles = particles.filter(p => p.age < p.life);
  for (const p of particles) {
    p.age++; p.vx*=.984; p.vy*=.984; p.vy+=.04;
    p.x+=p.vx; p.y+=p.vy;
    const t = 1 - p.age/p.life;
    fwCtx.globalAlpha = Math.max(0,t);
    fwCtx.fillStyle = `hsl(${p.hue},95%,65%)`;
    fwCtx.beginPath();
    fwCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    fwCtx.fill();
  }
  fwCtx.globalAlpha = 1;
  if (particles.length) requestAnimationFrame(fwTick);
  else { fwRunning=false; fwCtx.clearRect(0,0,innerWidth,innerHeight); }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function startGame() {
  score=0; movesLeft=INITIAL_MOVES; hints=3; busy=false; selected=null;
  document.getElementById('hintBtn').textContent = 'Hint (3)';
  document.getElementById('modal').classList.remove('open');
  initGrid();
  buildBoard();
  updateHUD();
}

document.getElementById('resetBtn').addEventListener('click', startGame);
document.getElementById('playAgainBtn').addEventListener('click', startGame);
document.getElementById('hintBtn').addEventListener('click', showHint);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
});

startGame();
</script>
</body>
</html>
