<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pink Match-3 + Fireworks</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="fireworksCanvas"></canvas>

  <div class="game-wrapper">
    <div class="game-header">
      <h1>💖 Pink Match-3 💖</h1>
      <div class="stats">
        <div class="stat-box">
          <span>Score:</span>
          <span id="score">0</span>
        </div>
        <div class="stat-box">
          <span>Moves:</span>
          <span id="moves">25</span>
        </div>
        <div class="stat-box">
          <span>Goal:</span>
          <span id="goal">3200</span>
        </div>
      </div>
    </div>

    <div class="game-container" id="gameContainer"></div>

    <div class="game-footer">
      <button id="resetBtn" class="btn">New Game</button>
      <button id="hintBtn" class="btn">Hint (3)</button>
    </div>

    <div id="gameOverModal" class="modal">
      <div class="modal-content">
        <h2 id="gameOverTitle">Game Over!</h2>
        <p id="gameOverMessage">Your Score: <span id="finalScore">0</span></p>
        <p id="gameOverMessage2">Goal: <span id="goalScore">3200</span></p>
        <div class="modal-buttons">
          <button id="playAgainBtn" class="btn btn-primary">Play Again</button>
          <button onclick="closeGameOver()" class="btn">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
