<link rel="stylesheet" href="style.css" />

<div class="container">
  <h1>Sports Memory Match</h1>
  <div class="stats">
    <div>Score: <span id="score">0</span></div>
    <div>Turns: <span id="turns">0</span></div>
    <div>Time: <span id="timer">60</span>s</div>

  <p id="message"></p>

<script src="script.js"></script>
