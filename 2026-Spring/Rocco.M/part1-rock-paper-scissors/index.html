<div class="container">
  <h1>Rock • Paper • Scissors</h1>
  <p class="sub">First to <b>3</b> wins (Best of 5)</p>

  <div class="choices" aria-label="choices">
    <button class="pick" data-choice="rock" aria-label="Rock">✊</button>
    <button class="pick" data-choice="paper" aria-label="Paper">✋</button>
    <button class="pick" data-choice="scissor" aria-label="Scissors">✌️</button>
  </div>

  <div class="both-choices">
    <h3>You: <span class="user-choice">—</span></h3>
    <h3>CPU: <span class="computer-choice">—</span></h3>
  </div>

  <p class="result">Pick a move to start!</p>

  <div class="points">
    <h3>You: <span class="user-points">0</span></h3>
    <h3>CPU: <span class="computer-points">0</span></h3>
  </div>

  <div class="actions">
    <button id="restart">Restart</button>
  </div>
</div
