<div class="wrap">
  <header>
    <h1>Football Target Kick</h1>
    <div class="hud">
      <div><span>Score</span><b id="score">0</b></div>
      <div><span>Kicks Left</span><b id="shots">10</b></div>
      <div><span>Wind</span><b id="wind">0</b></div>
    </div>
    <p class="hint">Click + drag from the ball to aim, release to kick. Hit the target for points.</p>
  </header>

  <canvas id="game" width="900" height="520"></canvas>

  <footer>
    <button id="reset">Reset Game</button>
  </footer>
</div>
