<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
}
#hud {
  display: flex;
  gap: 30px;
  margin-bottom: 8px;
  font-size: 18px;
  font-weight: bold;
  color: #7df9ff;
}
#game {
  border: 2px solid #0a9396;
  display: block;
  box-shadow: 0 0 30px rgba(0,245,255,0.25);
}
#info {
  margin-top: 8px;
  font-size: 13px;
  color: #94d2bd;
}
</style>

<div id="hud">
  <span>Score: <b id="scoreDisplay">0</b></span>
  <span>Lives: <b id="livesDisplay">3</b></span>
  <span>Level: <b id="levelDisplay">1</b></span>
</div>
<canvas id="game" width="480" height="600"></canvas>
<div id="info">← → Arrow Keys to move &nbsp;|&nbsp; Space to fire</div>

<script src="script.js"></script>
