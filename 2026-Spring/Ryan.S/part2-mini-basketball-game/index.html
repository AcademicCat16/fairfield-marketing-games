<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
}
#hud {
  display: flex;
  gap: 40px;
  margin-bottom: 12px;
  font-size: 20px;
  font-weight: bold;
  color: #ffd166;
}
#game {
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(255,150,0,0.3);
  display: block;
}
#info {
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}
</style>

<div id="hud">
  <span>Score: <b id="scoreEl">0</b></span>
  <span>Best: <b id="bestEl">0</b></span>
  <span>Shots: <b id="shotsEl">0</b></span>
</div>
<canvas id="game" width="600" height="400"></canvas>
<div id="info">Hold <b>SPACE</b> to charge, release to shoot &nbsp;|&nbsp; ← → to aim</div>

<script src="script.js"></script>
