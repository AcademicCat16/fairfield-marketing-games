<main class="card">
  <div class="top">
    <div>
      <h1>Cozy Garden Pickup 🌿</h1>
      <p class="sub">Play as the dachshund. Collect <b>5 flowers</b>, then return to the <b>basket</b>. Avoid the pond.</p>
    </div>
    <div class="hud">
      <span class="pill" id="flowersPill">FLOWERS: 0/5</span>
      <span class="pill" id="statusPill">STATUS: loading dog…</span>
    </div>
  </div>
  <canvas id="game" width="640" height="400" aria-label="Cozy top-down game"></canvas>
  <div class="controls">
    <button id="restartBtn">↻ Restart</button>
  </div>
  <div class="note">
    Controls: <b>WASD</b> or <b>Arrow Keys</b>. <b>Shift</b> to move a little faster.
  </div>
</main>
