<div class="game-container">
<h1>🏎 Racing Game</h1>
<div class="stats-bar">
<div class="stat">Speed: <span id="speed">0</span> km/h</div>
<div class="stat">Distance: <span id="distance">0</span> m</div>
<div class="stat">Lives: <span id="lives">3</span></div>
<div class="stat">Score: <span id="score">0</span></div>
</div>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div class="controls">
<h3>Controls:</h3>
<p>← → or A/D: Move Left/Right | Space: Accelerate</p>
<p>Avoid red cars and collect coins!</p>
</div>
<div class="button-group">
<button class="btn-start" id="btnStart">Start Game</button>
<button class="btn-reset" id="btnReset">Reset</button>
</div>
<div class="message" id="message"></div>
</div>
