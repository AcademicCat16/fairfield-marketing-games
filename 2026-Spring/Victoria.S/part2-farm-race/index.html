<main class="wrap">
  <header class="topbar">
    <div>
      <h1>Barnyard Blitz</h1>
      <p class="sub">You are the <b>Pig</b>. Use <b>Arrow Keys</b> or <b>WASD</b>. Avoid the mud and reach the barn first!</p>
    </div>
    <div class="hud">
      <div id="status">Press Start</div>
      <button id="startBtn" type="button">Start</button>
      <button id="resetBtn" type="button">Reset</button>
    </div>
  </header>

  <section class="gamepanel">
    <canvas id="game" width="960" height="540"></canvas>
  </section>

  <footer class="legend">
    <span><span class="pill mud"></span> Mud = Slow</span>
    <span><span class="pill fence"></span> Fence = Blocked</span>
    <span><span class="pill hay"></span> Hay = Bump</span>
  </footer>
</main>
