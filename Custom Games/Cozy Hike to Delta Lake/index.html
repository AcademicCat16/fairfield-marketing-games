<div id="instructions">
  <h1>Cozy Hike to Delta Lake</h1>
  <p>
    Help your puppy hike to <strong>Delta Lake, Jackson Hole, Wyoming</strong>.<br><br>
    • The puppy walks automatically<br>
    • Press <strong>G</strong> or <strong>Space</strong> to jump over rocks<br>
    • You have <strong>3 hearts</strong><br>
    • Hit 3 rocks and the hike restarts<br>
    • Survive <strong>45 seconds</strong> to reach the lake!
  </p>
  <button id="startBtn">Start Hike</button>
</div>

<div id="hud">
  <div id="lives"></div>
  <div id="timer">45</div>
</div>

<div id="game">
  <div id="sun"></div>
  <div id="mountains"></div>
  <div id="trees"></div>
  <div id="trail"></div>
  <div id="puppy"></div>
</div>

<p id="message"></p>
<button id="restartBtn" style="display:none;">Hike Again 🐾</button>
