<div class="game-shell">
<div class="topbar">
<div class="title">Cozy Monkey Zoo</div>
<div class="stats">
<div class="pill">Stuffed Friends: <span id="score">0</span></div>
<div class="pill">Visitors Helped: <span id="visitors">0</span></div>
</div>
</div>
<div class="controls">
Move with <strong>WASD</strong> or <strong>Arrow Keys</strong>. Collect stuffed
monkeys and make visitors happy.
</div>
<div class="canvas-wrap">
<canvas id="game" width="960" height="540"></canvas>
<div class="overlay" id="startOverlay">
<div class="card">
<h1>Cozy Monkey Zoo</h1>
<p>You are a monkey walking through a peaceful zoo carrying your favorite stuffed
monkey.</p>
<button id="startBtn">Start Game</button>
</div>
</div>
<div class="overlay" id="winOverlay" style="display: none;">
<div class="card">
<h1>You made the zoo cozy!</h1>
<button id="restartBtn">Play Again</button>
</div>
</div>
</div>
</div>
