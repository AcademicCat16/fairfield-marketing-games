<h1>Find the Egg!</h1>
<div id="message">Click Start to play.</div>
<button onclick="startGame()">Start Game</button>
<div id="gameArea">
  <div class="hat" id="hat0" onclick="guess(0)">
    <div class="egg"></div>
  </div>
  <div class="hat" id="hat1" onclick="guess(1)">
    <div class="egg"></div>
  </div>
  <div class="hat" id="hat2" onclick="guess(2)">
    <div class="egg"></div>
  </div>
</div>
